<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>화선 스튜디오 · HWASEON STUDIO</title>
<meta name="description" content="화선 스튜디오 — K사주와 별자리로 보는 나와 최애의 궁합. 인연(Inyeon) 앱을 만드는 작은 스튜디오." />
<meta property="og:title" content="화선 스튜디오 · HWASEON STUDIO" />
<meta property="og:description" content="K사주 × 별자리 × 최애 아이돌 궁합. 인연(Inyeon)을 만듭니다." />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --canvas: #0E0D14;
    --surface: #1A1820;
    --card: #221F2B;
    --text: #F5F2EC;
    --muted: #A7A1B5;
    --divider: #2A2632;
    --lavender: #7B6FCF;
    --gold: #FFD56B;
    --wood: #5FAE73;
    --fire: #D94F4F;
    --earth: #C9A96E;
    --metal: #E8E4DC;
    --water: #6F93C9;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--canvas);
    color: var(--text);
    font-family: 'Inter', 'Noto Sans KR', -apple-system, sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 0 24px; }
  a { color: inherit; text-decoration: none; }

  .glow {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(600px circle at 80% -5%, rgba(123,111,207,0.18), transparent 60%),
      radial-gradient(500px circle at 5% 20%, rgba(255,213,107,0.08), transparent 55%);
  }
  .content { position: relative; z-index: 1; }

  nav {
    position: sticky; top: 0; z-index: 10;
    backdrop-filter: blur(14px);
    background: rgba(14,13,20,0.72);
    border-bottom: 1px solid var(--divider);
  }
  nav .wrap { display: flex; align-items: center; justify-content: space-between; height: 64px; }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 800; letter-spacing: 0.02em; }
  .brand .mark {
    width: 30px; height: 30px; border-radius: 9px;
    background: linear-gradient(135deg, var(--lavender), var(--gold));
    display: grid; place-items: center; font-size: 16px; font-weight: 900; color: #1a1820;
  }
  .nav-right { display: flex; align-items: center; gap: 28px; }
  .nav-links { display: flex; gap: 28px; font-size: 14px; color: var(--muted); }
  .nav-links a:hover { color: var(--text); }
  @media (max-width: 680px) { .nav-links { display: none; } }

  /* lang toggle */
  .lang-toggle {
    display: inline-flex; border: 1px solid var(--divider); border-radius: 999px; overflow: hidden;
    font-size: 13px; font-weight: 600;
  }
  .lang-toggle button {
    background: transparent; border: none; color: var(--muted); cursor: pointer;
    padding: 7px 14px; font-family: inherit; font-weight: 600; transition: all .15s ease;
  }
  .lang-toggle button.active { background: var(--lavender); color: #fff; }

  header.hero { padding: 96px 0 72px; text-align: center; }
  .eyebrow {
    display: inline-block; font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--lavender); font-weight: 600; margin-bottom: 22px;
    padding: 6px 14px; border: 1px solid var(--divider); border-radius: 999px;
  }
  .hero h1 {
    font-size: clamp(40px, 8vw, 76px); line-height: 1.04; font-weight: 900;
    letter-spacing: -0.02em; margin-bottom: 22px;
  }
  .hero h1 .accent {
    background: linear-gradient(120deg, var(--lavender), var(--gold));
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  .hero p.lead { font-size: clamp(16px, 2.4vw, 20px); color: var(--muted); max-width: 580px; margin: 0 auto 36px; }
  .cta-row { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 14px 26px; border-radius: 14px; font-weight: 700; font-size: 15px;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .btn-primary { background: var(--lavender); color: #fff; box-shadow: 0 8px 30px rgba(123,111,207,0.35); }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 38px rgba(123,111,207,0.5); }
  .btn-ghost { border: 1px solid var(--divider); color: var(--text); }
  .btn-ghost:hover { border-color: var(--lavender); }

  .ohaeng { display: flex; gap: 14px; justify-content: center; margin-top: 56px; flex-wrap: wrap; }
  .el {
    width: 58px; height: 58px; border-radius: 16px; display: grid; place-items: center;
    font-size: 22px; font-weight: 700; border: 1px solid var(--divider); background: var(--card);
  }
  .el.wood { color: var(--wood); } .el.fire { color: var(--fire); }
  .el.earth { color: var(--earth); } .el.metal { color: var(--metal); }
  .el.water { color: var(--water); }

  section { padding: 80px 0; }
  .sec-label { font-size: 13px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--lavender); font-weight: 600; margin-bottom: 14px; }
  .sec-title { font-size: clamp(28px, 5vw, 44px); font-weight: 800; letter-spacing: -0.02em; margin-bottom: 18px; }
  .sec-sub { color: var(--muted); max-width: 620px; font-size: 17px; }

  .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; margin-top: 44px; }
  @media (max-width: 760px) { .grid3 { grid-template-columns: 1fr; } }
  .card {
    background: var(--card); border: 1px solid var(--divider); border-radius: 20px; padding: 28px;
    transition: border-color .2s ease, transform .2s ease;
  }
  .card:hover { border-color: var(--lavender); transform: translateY(-3px); }
  .card .ic { font-size: 28px; margin-bottom: 14px; }
  .card h3 { font-size: 19px; font-weight: 700; margin-bottom: 8px; }
  .card p { color: var(--muted); font-size: 15px; }

  .app {
    background: linear-gradient(160deg, var(--surface), var(--canvas));
    border: 1px solid var(--divider); border-radius: 28px;
    padding: 56px; margin-top: 44px;
    display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 48px; align-items: center;
  }
  @media (max-width: 820px) { .app { grid-template-columns: 1fr; padding: 36px; } }
  .app h3 { font-size: clamp(26px, 4vw, 36px); font-weight: 800; margin-bottom: 16px; letter-spacing: -0.02em; }
  .app .kr { color: var(--gold); }
  .feat { list-style: none; margin-top: 22px; display: flex; flex-direction: column; gap: 14px; }
  .feat li { display: flex; gap: 12px; align-items: flex-start; color: var(--muted); font-size: 16px; }
  .feat li b { color: var(--text); font-weight: 700; }
  .feat .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--lavender); margin-top: 9px; flex-shrink: 0; }

  .phone {
    width: 240px; margin: 0 auto; aspect-ratio: 9/19;
    background: var(--canvas); border: 8px solid #2A2632; border-radius: 34px;
    padding: 22px 18px; display: flex; flex-direction: column;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  }
  .phone .step { font-size: 12px; color: var(--muted); align-self: flex-end; }
  .phone .ph-title { font-size: 26px; font-weight: 900; line-height: 1.1; margin: 18px 0 24px; }
  .phone .field { background: var(--card); border: 1px solid var(--divider); border-radius: 12px; height: 44px; margin-bottom: 12px; }
  .phone .pill-row { display: flex; gap: 8px; margin-top: 6px; }
  .phone .pill { flex: 1; height: 40px; border-radius: 10px; border: 1px solid var(--divider); }
  .phone .pill.on { border-color: var(--lavender); background: rgba(123,111,207,0.15); }
  .phone .ph-btn { margin-top: auto; height: 46px; border-radius: 12px; background: var(--lavender); display: grid; place-items: center; font-weight: 800; font-size: 13px; color: #fff; }

  .band { text-align: center; padding: 90px 0; }
  .band h2 { font-size: clamp(28px, 5vw, 46px); font-weight: 900; letter-spacing: -0.02em; margin-bottom: 16px; }
  .band p { color: var(--muted); font-size: 18px; margin-bottom: 30px; }

  footer { border-top: 1px solid var(--divider); padding: 44px 0; }
  footer .wrap { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
  footer .muted { color: var(--muted); font-size: 14px; }
  footer a.link { color: var(--muted); font-size: 14px; }
  footer a.link:hover { color: var(--lavender); }
</style>
</head>

<script>
  function setLang(lang) {
    document.documentElement.lang = lang;
    document.querySelectorAll('[data-ko]').forEach(function (el) {
      var val = el.getAttribute('data-' + lang);
      if (val !== null) el.innerHTML = val;
    });
    document.getElementById('btn-ko').classList.toggle('active', lang === 'ko');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    try { localStorage.setItem('hw-lang', lang); } catch (e) {}
  }
  (function () {
    var saved = null;
    try { saved = localStorage.getItem('hw-lang'); } catch (e) {}
    var initial = saved || ((navigator.language || 'ko').toLowerCase().startsWith('ko') ? 'ko' : 'en');
    setLang(initial);
  })();
</script>
